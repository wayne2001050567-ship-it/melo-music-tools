<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>隨機停止練琴器</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    h1 {
      font-size: 36px;
    }

    .box {
      margin: 20px auto;
      padding: 30px;
      max-width: 500px;
      background: #222;
      border-radius: 16px;
    }

    input {
      padding: 8px;
      font-size: 18px;
      margin: 8px;
    }

    input[type="number"] {
      width: 80px;
      text-align: center;
    }

    input[type="file"] {
      max-width: 300px;
      font-size: 14px;
    }

    .sound-area {
      margin: 22px 0;
      padding: 18px;
      background: #181818;
      border-radius: 12px;
    }

    .sound-option {
      margin: 10px;
      font-size: 18px;
    }

    button {
      font-size: 22px;
      padding: 12px 28px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #startBtn {
      background: #4caf50;
      color: white;
    }

    #stopBtn {
      background: #f44336;
      color: white;
    }

    #testBtn {
      background: #2196f3;
      color: white;
      font-size: 18px;
    }

    #clearSoundBtn {
      background: #777;
      color: white;
      font-size: 16px;
    }

    #soundName {
      font-size: 14px;
      color: #ccc;
      margin-top: 8px;
    }

    #status {
      margin-top: 30px;
      font-size: 32px;
      font-weight: bold;
    }

    .ending {
      color: #ff5252;
      font-size: 72px;
      animation: flash 0.4s infinite alternate;
    }

    @keyframes flash {
      from { opacity: 1; }
      to { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <h1>隨機停止練琴器</h1>

  <div class="box">
    <p>最短停止時間：
      <input id="minTime" type="number" value="30"> 秒
    </p>

    <p>最長停止時間：
      <input id="maxTime" type="number" value="180"> 秒
    </p>

    <div class="sound-area">
      <h2>結尾音效</h2>

      <label class="sound-option">
        <input type="radio" name="soundMode" value="beep" checked>
        預設嗶聲
      </label>

      <label class="sound-option">
        <input type="radio" name="soundMode" value="custom">
        自訂 MP3
      </label>

      <p>
        <input id="soundFile" type="file" accept="audio/mp3,audio/*">
      </p>

      <div id="soundName">目前音效：預設嗶聲</div>

      <button id="testBtn" onclick="playEndingSound()">測試播放音效</button>
      <button id="clearSoundBtn" onclick="clearCustomSound()">清除自訂音效</button>
    </div>

    <button id="startBtn" onclick="startRandomStop()">開始</button>
    <button id="stopBtn" onclick="resetTool()">停止 / 重來</button>

    <div id="status">等待開始</div>
  </div>

  <script>
    let timer = null;
    let endingAudio = null;
    let db = null;

    const soundFileInput = document.getElementById("soundFile");
    const soundName = document.getElementById("soundName");

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("RandomStopSoundDB", 1);

        request.onupgradeneeded = function (event) {
          db = event.target.result;
          if (!db.objectStoreNames.contains("sounds")) {
            db.createObjectStore("sounds");
          }
        };

        request.onsuccess = function (event) {
          db = event.target.result;
          resolve(db);
        };

        request.onerror = function () {
          reject("無法開啟資料庫");
        };
      });
    }

    function saveSound(file) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(["sounds"], "readwrite");
        const store = transaction.objectStore("sounds");

        store.put(file, "customSound");
        store.put(file.name, "customSoundName");

        transaction.oncomplete = resolve;
        transaction.onerror = reject;
      });
    }

    function loadSound() {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(["sounds"], "readonly");
        const store = transaction.objectStore("sounds");

        const fileRequest = store.get("customSound");
        const nameRequest = store.get("customSoundName");

        fileRequest.onsuccess = function () {
          const file = fileRequest.result;

          if (file) {
            const audioURL = URL.createObjectURL(file);
            endingAudio = new Audio(audioURL);
            endingAudio.volume = 1;

            nameRequest.onsuccess = function () {
              soundName.textContent = "目前音效：" + nameRequest.result + "（已記住）";
              document.querySelector('input[name="soundMode"][value="custom"]').checked = true;
              resolve();
            };
          } else {
            soundName.textContent = "目前音效：預設嗶聲";
            resolve();
          }
        };

        fileRequest.onerror = reject;
      });
    }

    function clearCustomSound() {
      if (!db) return;

      const transaction = db.transaction(["sounds"], "readwrite");
      const store = transaction.objectStore("sounds");

      store.delete("customSound");
      store.delete("customSoundName");

      transaction.oncomplete = function () {
        endingAudio = null;
        soundFileInput.value = "";
        soundName.textContent = "目前音效：預設嗶聲";
        document.querySelector('input[name="soundMode"][value="beep"]').checked = true;
      };
    }

    soundFileInput.addEventListener("change", async function () {
      const file = soundFileInput.files[0];

      if (!file) return;

      const audioURL = URL.createObjectURL(file);
      endingAudio = new Audio(audioURL);
      endingAudio.volume = 1;

      await saveSound(file);

      soundName.textContent = "目前音效：" + file.name + "（已記住）";
      document.querySelector('input[name="soundMode"][value="custom"]').checked = true;
    });

    function getSoundMode() {
      return document.querySelector('input[name="soundMode"]:checked').value;
    }

    function startRandomStop() {
      resetTool();

      const min = Number(document.getElementById("minTime").value);
      const max = Number(document.getElementById("maxTime").value);
      const status = document.getElementById("status");

      if (min <= 0 || max <= 0 || min >= max) {
        status.textContent = "請確認時間設定正確";
        return;
      }

      if (endingAudio && getSoundMode() === "custom") {
        endingAudio.play().then(() => {
          endingAudio.pause();
          endingAudio.currentTime = 0;
        }).catch(() => {});
      }

      const randomSeconds = Math.floor(Math.random() * (max - min + 1)) + min;

      status.textContent = "練琴中……隨時準備收尾";
      status.className = "";

      timer = setTimeout(() => {
        status.textContent = "收尾！";
        status.className = "ending";
        playEndingSound();
      }, randomSeconds * 1000);
    }

    function resetTool() {
      if (timer) {
        clearTimeout(timer);
        timer = null;
      }

      const status = document.getElementById("status");
      status.textContent = "等待開始";
      status.className = "";
    }

    function playEndingSound() {
      if (getSoundMode() === "custom" && endingAudio) {
        endingAudio.currentTime = 0;
        endingAudio.play().catch(() => {
          alert("音效被瀏覽器擋住，請先按開始或測試播放一次");
        });
      } else {
        playBeep();
      }
    }

    function playBeep() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = 880;

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
      oscillator.stop(audioCtx.currentTime + 1.2);
    }

    async function init() {
      await openDB();
      await loadSound();
    }

    init();
  </script>

</body>
</html>
