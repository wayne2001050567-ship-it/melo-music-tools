<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>和弦譜編輯器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>和弦譜編輯器 V2</h1>

<div class="song-info">

    <input id="title" placeholder="歌名">
    <input id="artist" placeholder="演唱者">
    <input id="lyricist" placeholder="作詞">
    <input id="composer" placeholder="作曲">
    <input id="key" placeholder="原調">
    <input id="maleKey" placeholder="男調">
    <input id="femaleKey" placeholder="女調">

</div>

<br>

<textarea id="lyricsInput" placeholder="貼上歌詞"></textarea>

<br><br>

<button id="loadLyrics">載入歌詞</button>

<hr>

<div id="toolbar">

    <input id="customChordInput" placeholder="自訂和弦，例如 Fmaj7">

    <button id="addCustomChordBtn">新增和弦按鈕</button>

    <br><br>

    <button class="chordBtn">C</button>
    <button class="chordBtn">Cm</button>
    <button class="chordBtn">C7</button>
    <button class="chordBtn">Cmaj7</button>
    <button class="chordBtn">Csus4</button>

    <button class="chordBtn">D</button>
    <button class="chordBtn">Dm</button>
    <button class="chordBtn">D7</button>
    <button class="chordBtn">D/F#</button>

    <button class="chordBtn">E</button>
    <button class="chordBtn">Em</button>
    <button class="chordBtn">E7</button>

    <button class="chordBtn">F</button>
    <button class="chordBtn">Fm</button>
    <button class="chordBtn">Fmaj7</button>

    <button class="chordBtn">G</button>
    <button class="chordBtn">G7</button>
    <button class="chordBtn">Gsus4</button>
    <button class="chordBtn">G/B</button>

    <button class="chordBtn">A</button>
    <button class="chordBtn">Am</button>
    <button class="chordBtn">Am7</button>
    <button class="chordBtn">A7</button>

    <button class="chordBtn">B</button>
    <button class="chordBtn">Bm</button>
    <button class="chordBtn">Bm7</button>
    <button class="chordBtn">Bb</button>

    <button id="barBtn">|</button>
    <button class="sectionBtn">[前奏]</button>
    <button class="sectionBtn">[主歌]</button>
    <button class="sectionBtn">[副歌]</button>
    <button class="sectionBtn">[間奏]</button>
    <button class="sectionBtn">[尾奏]</button>
    <button class="sectionBtn">[反覆]</button>
    <button class="sectionBtn">空白行</button>
</div>
<hr>

<div id="stylePanel">
    標題大小
    <input id="titleSize" type="number" value="30">

    歌詞大小
    <input id="lyricSize" type="number" value="16">

    和弦大小
    <input id="chordSize" type="number" value="15">

    標題顏色
    <input id="titleColor" type="color" value="#303f8f">

    歌詞顏色
    <input id="lyricColor" type="color" value="#111111">

    和弦顏色
    <input id="chordColor" type="color" value="#0066aa">

    <button id="applyStyleBtn">更新版面</button>
</div>

<button id="updateInfoBtn">更新譜面資訊</button>
<button id="saveProjectBtn">儲存專案</button>
<input type="file" id="loadProjectInput" accept=".json">

<hr>

<div id="scorePage">

    <div id="scoreHeader">

        <div id="leftInfo"></div>
        <div id="scoreTitle"></div>
        <div id="rightInfo"></div>

    </div>

    <div id="editor"></div>

</div>

<script src="script.js"></script>

</body>
</html>
